name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: false
        default: ''

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - name: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            link_type: default
            llvm_archive: LLVM-21.1.8-Linux-X64.tar.xz

          - name: linux-x64-static
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            link_type: static
            llvm_archive: LLVM-21.1.8-Linux-X64.tar.xz

          - name: linux-x64-dynamic
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            link_type: dynamic
            llvm_archive: LLVM-21.1.8-Linux-X64.tar.xz

          # Linux ARM64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            link_type: default
            llvm_archive: LLVM-21.1.8-Linux-ARM64.tar.xz

          - name: linux-arm64-static
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            link_type: static
            llvm_archive: LLVM-21.1.8-Linux-ARM64.tar.xz

          - name: linux-arm64-dynamic
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            link_type: dynamic
            llvm_archive: LLVM-21.1.8-Linux-ARM64.tar.xz

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            echo "value=$INPUT" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libffi-dev zlib1g-dev patchelf

      - name: Setup LLVM
        run: |
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/${{ matrix.llvm_archive }}"
          echo "Downloading $URL"
          mkdir -p /tmp/llvm
          curl -fSL --retry 3 --connect-timeout 30 "$URL" -o /tmp/llvm.tar.xz
          tar xf /tmp/llvm.tar.xz -C /tmp/llvm --strip-components=1
          rm -f /tmp/llvm.tar.xz
          echo "LLVM_SYS_211_PREFIX=/tmp/llvm" >> "$GITHUB_ENV"

      - name: Force static linking
        if: matrix.link_type == 'static'
        run: |
          find /tmp/llvm/lib -maxdepth 1 -name 'libLLVM.so*' -delete 2>/dev/null || true

      - name: Build (non-static)
        if: matrix.link_type != 'static'
        run: |
          export RUSTFLAGS='-C link-args=-Wl,-rpath,$ORIGIN/../lib'
          cargo build --release --target ${{ matrix.target }}

      - name: Build (static)
        if: matrix.link_type == 'static'
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Smoke test
        run: cargo test --release 2>&1 | tail -5

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.value }}"
          ARCH="${{ contains(matrix.target, 'aarch64') && 'arm64' || 'x64' }}"
          SUFFIX="${{ matrix.link_type == 'default' && '' || '-' }}"
          if [ "${{ matrix.link_type }}" != "default" ]; then
            SUFFIX="-${{ matrix.link_type }}"
          else
            SUFFIX=""
          fi
          PKG="atomic-${VER}-linux-${ARCH}${SUFFIX}"
          DIR="/tmp/${PKG}"

          mkdir -p "${DIR}/bin" "${DIR}/lib" "${DIR}/examples"

          cp "target/${{ matrix.target }}/release/atomic" "${DIR}/bin/"
          cp README.md "${DIR}/"
          cp -r examples/* "${DIR}/examples/" 2>/dev/null || true

          strip "${DIR}/bin/atomic" 2>/dev/null || true

          if [ "${{ matrix.link_type }}" = "default" ]; then
            LLVM_SO=$(find /tmp/llvm/lib -maxdepth 1 -name 'libLLVM.so.*' ! -name '*.gz' 2>/dev/null | head -1)
            if [ -z "$LLVM_SO" ]; then
              echo "::error::Could not find libLLVM.so in /tmp/llvm/lib"
              ls -la /tmp/llvm/lib/libLLVM* 2>/dev/null || echo "(no libLLVM* found)"
              exit 1
            fi
            cp "$LLVM_SO" "${DIR}/lib/"
            patchelf --set-rpath '$ORIGIN/../lib' "${DIR}/bin/atomic"
          fi

          cd /tmp
          tar czf "${PKG}.tar.gz" "${PKG}"
          echo "file=${PKG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: /tmp/${{ steps.pkg.outputs.file }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p /tmp/release-assets
          find /tmp/artifacts -type f -name '*.tar.gz' \
            -exec cp {} /tmp/release-assets/ \;
          echo "Assets to upload:"
          ls -lh /tmp/release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Atomic v${{ steps.ver.outputs.value }}
          tag_name: ${{ github.ref_name }}
          files: /tmp/release-assets/*
          body: |
            ## Atomic Language Compiler v${{ steps.ver.outputs.value }}

            Pre-built binaries for Linux x64 and ARM64.

            ### Linux x64
            - [Default](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-linux-x64.tar.gz) -- bundled LLVM, ready to use
            - [Static](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-linux-x64-static.tar.gz) -- self-contained, LLVM baked in
            - [Dynamic](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-linux-x64-dynamic.tar.gz) -- needs LLVM 21 installed

            ### Linux ARM64
            - [Default](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-linux-arm64.tar.gz) -- bundled LLVM, ready to use
            - [Static](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-linux-arm64-static.tar.gz)
            - [Dynamic](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-linux-arm64-dynamic.tar.gz)

            ### 版本说明
            - **Default** — 动态链接 + 打包 LLVM 共享库，开箱即用，推荐大多数用户使用
            - **Static** — LLVM 静态编译进二进制，单文件即可运行，体积较大
            - **Dynamic** — 不携带 LLVM 库，体积最小，需自行安装 LLVM 21

            ### Installation
            Extract the archive and add the `bin/` directory to your PATH.
            For default builds, keep the `lib/` directory next to `bin/`.
          generate_release_notes: true
