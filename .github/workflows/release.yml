name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: false
        default: ''

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            ext: tar.gz
            llvm_archive: LLVM-21.1.8-Linux-X64.tar.xz

          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
            ext: tar.gz
            llvm_archive: LLVM-21.1.8-Linux-ARM64.tar.xz

          - name: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            arch: x64
            ext: zip
            llvm_archive: clang+llvm-21.1.8-x86_64-pc-windows-msvc.tar.xz

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        shell: bash
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            echo "value=$INPUT" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libffi-dev zlib1g-dev

      - name: Setup LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/${{ matrix.llvm_archive }}"
          echo "Downloading $URL"
          mkdir -p /tmp/llvm
          curl -fSL --retry 3 --connect-timeout 30 "$URL" -o /tmp/llvm.tar.xz
          tar xf /tmp/llvm.tar.xz -C /tmp/llvm --strip-components=1
          rm -f /tmp/llvm.tar.xz
          echo "LLVM_SYS_211_PREFIX=/tmp/llvm" >> "$GITHUB_ENV"
          echo "LLVM installed:"
          ls /tmp/llvm/bin/llvm-config* 2>/dev/null || echo "(no llvm-config)"
          /tmp/llvm/bin/llvm-config --version 2>/dev/null || echo "(llvm-config failed)"

      - name: Setup LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $URL = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/${{ matrix.llvm_archive }}"
          Write-Host "Downloading $URL"
          curl.exe -fSL --retry 3 --connect-timeout 30 -o C:\llvm.tar.xz "$URL"
          Write-Host "Extracting..."
          mkdir -p C:\llvm
          tar -xf C:\llvm.tar.xz -C C:\llvm --strip-components=1
          Remove-Item C:\llvm.tar.xz -Force
          echo "LLVM_SYS_211_PREFIX=C:\llvm" >> $env:GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: cargo test --release 2>&1 | tail -5

      - name: Package (Linux)
        if: runner.os == 'Linux'
        id: pkg-linux
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.value }}"
          PKG="atomic-${VER}-linux-${{ matrix.arch }}"
          DIR="/tmp/${PKG}"

          mkdir -p "${DIR}/bin" "${DIR}/examples"

          cp "target/${{ matrix.target }}/release/atomic" "${DIR}/bin/"
          cp README.md "${DIR}/"
          cp -r examples/* "${DIR}/examples/" 2>/dev/null || true

          strip "${DIR}/bin/atomic" 2>/dev/null || true

          cd /tmp
          tar czf "${PKG}.tar.gz" "${PKG}"
          echo "file=${PKG}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        id: pkg-windows
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $VER = "${{ steps.ver.outputs.value }}"
          $PKG = "atomic-${VER}-windows-x64"
          $DIR = "C:\${PKG}"

          New-Item -ItemType Directory -Force -Path "$DIR\bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$DIR\examples" | Out-Null

          Copy-Item "target\${{ matrix.target }}\release\atomic.exe" -Destination "$DIR\bin\"
          Copy-Item "README.md" -Destination "$DIR\"
          Copy-Item "examples\*" -Destination "$DIR\examples\" -Recurse -Force -ErrorAction SilentlyContinue

          $archive = "${PKG}.zip"
          Compress-Archive -Path "$DIR" -DestinationPath "C:\${archive}"
          echo "file=${archive}" >> $env:GITHUB_OUTPUT

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: /tmp/${{ steps.pkg-linux.outputs.file }}
          if-no-files-found: error

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: C:\${{ steps.pkg-windows.outputs.file }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p /tmp/release-assets
          find /tmp/artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec cp {} /tmp/release-assets/ \;
          echo "Assets to upload:"
          ls -lh /tmp/release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Atomic v${{ steps.ver.outputs.value }}
          tag_name: ${{ github.ref_name }}
          files: /tmp/release-assets/*
          body: |
            ## Atomic Language Compiler v${{ steps.ver.outputs.value }}

            Pre-built binaries for all supported platforms.

            | Platform | Package |
            |----------|---------|
            | Linux x64 | [atomic-${{ steps.ver.outputs.value }}-linux-x64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-linux-x64.tar.gz) |
            | Linux ARM64 | [atomic-${{ steps.ver.outputs.value }}-linux-arm64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-linux-arm64.tar.gz) |
            | Windows x64 | [atomic-${{ steps.ver.outputs.value }}-windows-x64.zip](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/atomic-${{ steps.ver.outputs.value }}-windows-x64.zip) |

            ### Installation
            Extract the archive and add the `bin/` directory to your PATH.

            ```bash
            # Linux
            tar xzf atomic-${{ steps.ver.outputs.value }}-linux-x64.tar.gz
            export PATH="$PWD/atomic-${{ steps.ver.outputs.value }}-linux-x64/bin:$PATH"
            atomic run hello.at
            ```
          generate_release_notes: true
