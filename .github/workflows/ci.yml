name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  LLVM_VERSION: '21.1.8'
  LLVM_TAG: llvmorg-21.1.8

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: self-hosted
            target: x86_64-unknown-linux-gnu

          - name: Windows x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            llvm_archive: clang+llvm-21.1.8-x86_64-pc-windows-msvc.tar.xz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Nix shell (self-hosted Linux) ─────────────────
      # All deps (LLVM, libffi, zlib, etc.) come from shell.nix.
      # Wrap subsequent cargo commands in: nix-shell --run "..."
      - name: Verify nix-shell
        if: runner.os == 'Linux'
        run: |
          nix-shell --run "echo 'LLVM:' && llvm-config --version && echo 'Rust:' && rustc --version"

      - name: Setup LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $URL = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/${{ matrix.llvm_archive }}"
          Write-Host "Downloading $URL"
          curl.exe -fSL --retry 3 --connect-timeout 30 -o C:\llvm.tar.xz "$URL"
          Write-Host "Extracting..."
          New-Item -Force -ItemType Directory -Path C:\llvm-extract | Out-Null
          tar -xf C:\llvm.tar.xz -C C:\llvm-extract
          Remove-Item C:\llvm.tar.xz -Force
          $innerDir = Get-ChildItem C:\llvm-extract -Directory | Select-Object -First 1
          if ($innerDir) {
            Move-Item $innerDir.FullName C:\llvm -Force
          } else {
            Rename-Item C:\llvm-extract C:\llvm -Force
          }
          Remove-Item C:\llvm-extract -Recurse -Force -ErrorAction SilentlyContinue
          echo "LLVM_SYS_211_PREFIX=C:\llvm" >> $env:GITHUB_ENV
          echo "C:\llvm\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Create libxml2 stub (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $libExe = Get-ChildItem "$env:ProgramFiles\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC" -Recurse -Filter "lib.exe" -Depth 6 -ErrorAction SilentlyContinue | Where-Object { $_.Directory.Name -eq "x64" -and $_.Directory.Parent.Name -eq "HostX64" } | Select-Object -First 1
          if (-not $libExe) { throw "Cannot find lib.exe" }
          "LIBRARY libxml2`nEXPORTS" | Out-File -Encoding ASCII C:\llvm\lib\libxml2s.def
          & $libExe.FullName /DEF:C:\llvm\lib\libxml2s.def /OUT:C:\llvm\lib\libxml2s.lib /MACHINE:X64
          Remove-Item C:\llvm\lib\libxml2s.def -Force

      # ── Build (debug is fine for CI) ──────────────────
      - name: Build
        if: runner.os == 'Windows'
        run: cargo build --target ${{ matrix.target }}
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: nix-shell --run "cargo build --target ${{ matrix.target }}"

      # ── Smoke test (check) ────────────────────────────
      - name: Smoke test (check)
        shell: bash
        if: runner.os == 'Windows'
        run: |
          ATOMIC="target/${{ matrix.target }}/debug/atomic"
          if [ "${{ runner.os }}" = "Windows" ]; then
            ATOMIC="$ATOMIC.exe"
          fi
          echo "Running $ATOMIC check examples/hello.at"
          "$ATOMIC" check examples/hello.at
          echo "Smoke test passed."
      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          nix-shell --run './target/${{ matrix.target }}/debug/atomic check examples/hello.at'
          echo "Smoke test passed."

      # ── Test ──────────────────────────────────────────
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: cargo test --target ${{ matrix.target }}
      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: nix-shell --run "cargo test --target ${{ matrix.target }}"

      # ── Debug: show run output on failure ──────────────
      - name: Debug run output (Windows)
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $atomic = "target/${{ matrix.target }}/debug/atomic.exe"
          Write-Host "Running $atomic run examples/hello.at"
          & $atomic run examples/hello.at *>&1 | Tee-Object -FilePath atomic_run_output.txt
          Write-Host "Exit code: $LASTEXITCODE"
          Get-Content atomic_run_output.txt
      - name: Debug run output (Linux)
        if: failure() && runner.os == 'Linux'
        run: |
          nix-shell --run './target/${{ matrix.target }}/debug/atomic run examples/hello.at' 2>&1 | tee atomic_run_output.txt
      - name: Upload run output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: run-output-${{ matrix.name }}-${{ github.run_id }}
          path: atomic_run_output.txt

  lint:
    name: Lint & fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings 2>&1 || echo "::warning::Clippy found issues"
