name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  LLVM_VERSION: '21'

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu

          - name: Windows x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            llvm_archive: clang+llvm-21.1.8-x86_64-pc-windows-msvc.tar.xz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── System deps (Linux) ───────────────────────────
      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libffi-dev zlib1g-dev

      # ── LLVM ──────────────────────────────────────────
      - name: Setup LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-$LLVM_VERSION main"
          sudo apt-get update -qq
          sudo apt-get install -y -qq llvm-$LLVM_VERSION-dev
          sudo ln -sf /usr/bin/llvm-config-$LLVM_VERSION /usr/local/bin/llvm-config
          echo "LLVM_SYS_211_PREFIX=/usr/lib/llvm-$LLVM_VERSION" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-$LLVM_VERSION/lib" >> "$GITHUB_ENV"
          llvm-config --version

      - name: Setup LLVM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $URL = "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/${{ matrix.llvm_archive }}"
          Write-Host "Downloading $URL"
          curl.exe -fSL --retry 3 --connect-timeout 30 -o C:\llvm.tar.xz "$URL"
          Write-Host "Extracting..."
          mkdir -p C:\llvm
          tar -xf C:\llvm.tar.xz -C C:\llvm --strip-components=1
          Remove-Item C:\llvm.tar.xz -Force
          echo "LLVM_SYS_211_PREFIX=C:\llvm" >> $env:GITHUB_ENV

      # ── Build (debug is fine for CI) ──────────────────
      - name: Build
        run: cargo build --target ${{ matrix.target }}

      # ── Test (Linux only — tests need JIT/execution) ──
      - name: Test
        if: runner.os == 'Linux'
        run: cargo test --target ${{ matrix.target }}

      # ── Type-check examples ───────────────────────────
      - name: Type-check examples
        if: runner.os == 'Linux'
        run: |
          echo "::group::Building atomic binary"
          cargo build --target ${{ matrix.target }}
          echo "::endgroup::"
          for f in examples/*.at; do
            echo "Checking $f..."
            cargo run --target ${{ matrix.target }} -- run "$f" --check 2>&1 || echo "::warning::Type check failed for $f"
          done

  lint:
    name: Lint & fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings 2>&1 || echo "::warning::Clippy found issues"
